kind = "web"
previewPath = "/"
title = "Podium — Public Speaking Studio"
version = "1.0.0"
id = "artifacts/speak-course"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24999

[services.development]
run = "pnpm --filter @workspace/speak-course run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/speak-course", "run", "build" ]
publicDir = "artifacts/speak-course/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24999"
BASE_PATH = "/"
