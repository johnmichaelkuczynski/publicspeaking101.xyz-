openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: speaking
    description: Public-speaking course content, spoken assignments, and evaluation
  - name: Storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [ health ]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /speaking/overview:
    get:
      operationId: getSpeakingOverview
      tags: [ speaking ]
      summary: Course-level overview with units, assignments, and progress
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingOverview"

  /speaking/units/{unitNumber}:
    get:
      operationId: getSpeakingUnit
      tags: [ speaking ]
      summary: Get one unit's lectures and assignment list
      parameters:
        - name: unitNumber
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingUnit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/lectures/{lectureId}:
    get:
      operationId: getSpeakingLecture
      tags: [ speaking ]
      summary: Get a single lecture
      parameters:
        - name: lectureId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingLecture"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/lectures/{lectureId}/tutor:
    post:
      operationId: askLectureTutor
      tags: [ speaking ]
      summary: Ask the lecture AI tutor a question
      parameters:
        - name: lectureId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LectureTutorRequest"
      responses:
        "200":
          description: Tutor reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureTutorReply"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Tutor upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/lectures/{lectureId}/tutor/suggestions:
    get:
      operationId: getLectureTutorSuggestions
      tags: [ speaking ]
      summary: Get suggested starter questions for the lecture tutor
      parameters:
        - name: lectureId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Suggested questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureTutorSuggestions"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Tutor upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/assignments/{assignmentId}:
    get:
      operationId: getSpeakingAssignment
      tags: [ speaking ]
      summary: Get an assignment with its prompts
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingAssignment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/assignments/{assignmentId}/start:
    post:
      operationId: startSpeakingAttempt
      tags: [ speaking ]
      summary: Start (or resume) an attempt for an assignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingAttempt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/attempts:
    get:
      operationId: listSpeakingAttempts
      tags: [ speaking ]
      summary: List all attempts, most recent first
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpeakingAttemptSummary"

  /speaking/attempts/{attemptId}:
    get:
      operationId: getSpeakingAttempt
      tags: [ speaking ]
      summary: Get an attempt and its responses
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingAttempt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/attempts/{attemptId}/responses:
    post:
      operationId: submitSpeakingResponse
      tags: [ speaking ]
      summary: Submit one response (spoken or written); transcribes and evaluates it
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeakingResponseInput"
      responses:
        "200":
          description: Graded response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Evaluation upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/attempts/{attemptId}/submit:
    post:
      operationId: finalizeSpeakingAttempt
      tags: [ speaking ]
      summary: Finalize an attempt and roll up the overall score
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingAttempt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/progress:
    get:
      operationId: getSpeakingProgress
      tags: [ speaking ]
      summary: KPIs, per-unit progress, and recent activity
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingProgress"

  /speaking/assignments/{assignmentId}/practice:
    post:
      operationId: generateSpeakingPractice
      tags: [ speaking ]
      summary: Generate a fresh, unofficial practice version of an assignment and start an attempt
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Practice set generated and attempt started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingPracticeStart"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Practice generation upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
      operationId: listSpeakingPractice
      tags: [ speaking ]
      summary: List previously generated practice sets for an assignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpeakingPracticeSet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/attempts/{attemptId}/tutor:
    post:
      operationId: askPracticeTutor
      tags: [ speaking ]
      summary: Ask the on-screen practice coach about this practice attempt and its feedback
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskPracticeTutorRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LectureTutorReply"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Tutor upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/profile:
    get:
      operationId: getSpeakingProfile
      tags: [ speaking ]
      summary: The evolving coaching profile and analytics built from all logged activity
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakingProfile"
        "502":
          description: Profile generation upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/reset:
    post:
      operationId: resetSpeakingCourse
      tags: [ speaking ]
      summary: Wipe all student progress while preserving course content
      responses:
        "200":
          description: Course reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetCourseResult"
        "502":
          description: Reset failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/lectures/generate:
    post:
      operationId: generateSpeakingLectures
      tags: [ speaking ]
      summary: Author additional medium + long lecture variants for each unit
      responses:
        "200":
          description: Lectures generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateLecturesResult"
        "502":
          description: Lecture generation upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/assessments:
    get:
      operationId: getSpeakingAssessments
      tags: [ speaking ]
      summary: Diagnostic assessment plan, completion credit, and custom builds
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentsOverview"

  /speaking/assessments/start:
    post:
      operationId: startSpeakingAssessment
      tags: [ speaking ]
      summary: Start (or retake) a diagnostic assessment slot with fresh questions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartAssessmentRequest"
      responses:
        "200":
          description: Assessment started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Question generation upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/assessments/build:
    post:
      operationId: buildSpeakingAssessment
      tags: [ speaking ]
      summary: Build a custom assessment from a free-text request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildAssessmentRequest"
      responses:
        "200":
          description: Custom assessment built
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Question generation upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/assessments/{assessmentId}:
    get:
      operationId: getSpeakingAssessment
      tags: [ speaking ]
      summary: Fetch one assessment instance with its questions and answers
      parameters:
        - name: assessmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/assessments/{assessmentId}/complete:
    post:
      operationId: completeSpeakingAssessment
      tags: [ speaking ]
      summary: Record answers and mark an assessment complete (completion credit)
      parameters:
        - name: assessmentId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteAssessmentRequest"
      responses:
        "200":
          description: Assessment completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /speaking/narrative-report:
    post:
      operationId: generateNarrativeReport
      tags: [ speaking ]
      summary: Generate an AI written progress report from all logged work
      responses:
        "200":
          description: Report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeReport"
        "502":
          description: Report generation upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/uploads/request-url:
    post:
      tags: [ Storage ]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [ Storage ]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [ Storage ]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    ErrorEnvelope:
      type: object
      required: [ error ]
      properties:
        error: { type: string }

    UploadUrlRequest:
      type: object
      required: [ name, size, contentType ]
      properties:
        name: { type: string, minLength: 1 }
        size: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
    UploadUrlResponse:
      type: object
      required: [ uploadURL, objectPath ]
      properties:
        uploadURL: { type: string, format: uri }
        objectPath: { type: string }
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    SpeakingLectureRef:
      type: object
      required: [ id, code, title ]
      properties:
        id: { type: integer }
        code: { type: string }
        title: { type: string }

    SpeakingLecture:
      type: object
      required: [ id, unitNumber, code, title, body ]
      properties:
        id: { type: integer }
        unitNumber: { type: integer }
        code: { type: string }
        title: { type: string }
        body: { type: string }
        unitTitle: { type: [ "string", "null" ] }

    LectureTutorMessage:
      type: object
      required: [ role, content ]
      properties:
        role:
          type: string
          enum: [ user, assistant ]
        content: { type: string }

    LectureTutorRequest:
      type: object
      required: [ messages ]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/LectureTutorMessage"

    LectureTutorReply:
      type: object
      required: [ reply ]
      properties:
        reply: { type: string }

    LectureTutorSuggestions:
      type: object
      required: [ suggestions ]
      properties:
        suggestions:
          type: array
          items: { type: string }

    SpeakingPrompt:
      type: object
      required: [ id, position, mode, prompt ]
      properties:
        id: { type: integer }
        position: { type: integer }
        mode:
          type: string
          enum: [ spoken, written ]
        prompt: { type: string }
        code: { type: [ "string", "null" ] }
        topicTitle: { type: [ "string", "null" ] }
        targetSeconds: { type: [ "integer", "null" ] }
        rubric: { type: [ "string", "null" ] }
        guidance: { type: [ "string", "null" ] }

    SpeakingAssignmentSummary:
      type: object
      required: [ id, kind, title, unitNumber, mode, promptCount, status ]
      properties:
        id: { type: integer }
        kind:
          type: string
          enum: [ homework, test, capstone ]
        title: { type: string }
        unitNumber: { type: integer }
        mode:
          type: string
          enum: [ spoken, written, mixed ]
        promptCount: { type: integer }
        status:
          type: string
          enum: [ not_started, in_progress, submitted ]
        bestScore: { type: [ "number", "null" ] }
        lastAttemptId: { type: [ "integer", "null" ] }

    SpeakingAssignment:
      type: object
      required: [ id, kind, title, unitNumber, prompts ]
      properties:
        id: { type: integer }
        kind:
          type: string
          enum: [ homework, test, capstone ]
        title: { type: string }
        unitNumber: { type: integer }
        instructions: { type: [ "string", "null" ] }
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingPrompt"

    SpeakingUnit:
      type: object
      required: [ unitNumber, title, lectures, assignments ]
      properties:
        unitNumber: { type: integer }
        title: { type: string }
        summary: { type: [ "string", "null" ] }
        lectures:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingLectureRef"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingAssignmentSummary"

    SpeakingOverview:
      type: object
      required: [ title, units, totals ]
      properties:
        title: { type: string }
        units:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingUnit"
        totals:
          type: object
          required: [ assignmentsCompleted, assignmentsTotal, attemptsCount ]
          properties:
            assignmentsCompleted: { type: integer }
            assignmentsTotal: { type: integer }
            attemptsCount: { type: integer }

    SpeakingMetrics:
      type: object
      required:
        [
          durationSeconds,
          wordCount,
          wordsPerMinute,
          fillerCount,
          fillerRate,
          pauseCount,
          longestPauseMs,
          fluencyScore,
          vocalVarietyScore
        ]
      properties:
        durationSeconds: { type: number }
        wordCount: { type: integer }
        wordsPerMinute: { type: number }
        fillerCount: { type: integer }
        fillerRate: { type: number }
        pauseCount: { type: integer }
        longestPauseMs: { type: integer }
        fluencyScore: { type: number }
        vocalVarietyScore: { type: number }

    SpeakingResponse:
      type: object
      required: [ id, promptId, mode, status ]
      properties:
        id: { type: integer }
        promptId: { type: integer }
        mode:
          type: string
          enum: [ spoken, written ]
        status:
          type: string
          enum: [ pending, graded, failed ]
        textAnswer: { type: [ "string", "null" ] }
        recordingObjectPath: { type: [ "string", "null" ] }
        mediaKind:
          type: [ "string", "null" ]
          enum: [ audio, video, null ]
        durationMs: { type: [ "integer", "null" ] }
        transcript: { type: [ "string", "null" ] }
        metrics:
          oneOf:
            - $ref: "#/components/schemas/SpeakingMetrics"
            - type: "null"
        contentScore: { type: [ "number", "null" ] }
        deliveryScore: { type: [ "number", "null" ] }
        overallScore: { type: [ "number", "null" ] }
        grade: { type: [ "string", "null" ] }
        summary: { type: [ "string", "null" ] }
        whatWorked:
          type: array
          items: { type: string }
        whatToFix:
          type: array
          items: { type: string }
        focusPointers:
          type: array
          items: { type: string }
        drills:
          type: array
          items: { type: string }
        errorMessage: { type: [ "string", "null" ] }
        gradedAt: { type: [ "string", "null" ], format: date-time }

    SpeakingAttempt:
      type: object
      required: [ id, assignmentId, status, startedAt, responses, isPractice ]
      properties:
        id: { type: integer }
        assignmentId: { type: integer }
        assignmentTitle: { type: [ "string", "null" ] }
        unitNumber: { type: [ "integer", "null" ] }
        kind: { type: [ "string", "null" ] }
        isPractice: { type: boolean }
        practiceForAssignmentId: { type: [ "integer", "null" ] }
        practiceParentTitle: { type: [ "string", "null" ] }
        status:
          type: string
          enum: [ in_progress, submitted ]
        overallScore: { type: [ "number", "null" ] }
        startedAt: { type: string, format: date-time }
        submittedAt: { type: [ "string", "null" ], format: date-time }
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingPrompt"
        responses:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingResponse"

    SpeakingAttemptSummary:
      type: object
      required: [ id, assignmentId, assignmentTitle, unitNumber, kind, status, startedAt, isPractice ]
      properties:
        id: { type: integer }
        assignmentId: { type: integer }
        assignmentTitle: { type: string }
        unitNumber: { type: integer }
        kind: { type: string }
        isPractice: { type: boolean }
        practiceForAssignmentId: { type: [ "integer", "null" ] }
        status:
          type: string
          enum: [ in_progress, submitted ]
        overallScore: { type: [ "number", "null" ] }
        startedAt: { type: string, format: date-time }
